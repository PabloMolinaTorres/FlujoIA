<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Flujo IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./falabella.png" type="image/png" />

  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,900" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --card2: #f1f3f5;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #e5e7eb;
      --greenFalabella: #8fca00;
      --greenDark: #6fa800;
      --red: #ef4444;
      --orange: #fb923c;
      --yellow: #facc15;
      --lime: #a3e635;
      --green: #22c55e;
      --blue: #3b82f6;
      --shadow: 0 8px 24px rgba(0, 0, 0, .07);
      --radius: 18px;
    }

    body.dark {
      --bg: #060606;
      --card: #111111;
      --card2: #1b1b1b;
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --border: #2a2a2a;
      --shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box;
      font-family: 'Lato', sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 3px 18px rgba(0, 0, 0, .04);
    }

    .topbar-inner {
      max-width: 1450px;
      margin: 0 auto;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--greenFalabella), #c9f000);
      color: white;
      font-weight: 900;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(143, 202, 0, .25);
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
    }

    .brand small {
      display: block;
      color: var(--muted);
      margin-top: 2px;
      font-size: 12px;
    }

    .version {
      display: inline-flex;
      margin-left: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(143, 202, 0, .13);
      color: var(--greenDark);
      font-size: 11px;
      font-weight: 900;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-select {
      min-width: 190px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      outline: none;
      font-weight: 700;
    }

    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
    }

    .main {
      max-width: 1450px;
      margin: 0 auto;
      padding: 22px;
    }

    .lock-message {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      font-weight: 700;
      line-height: 1.45;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn:disabled,
    .tab:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--greenFalabella);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--greenDark);
    }

    .btn-soft {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-blue {
      background: var(--blue);
      color: white;
    }

    .btn-red {
      background: var(--red);
      color: white;
    }

    .btn-small {
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 10px;
    }

    .hidden {
      display: none !important;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tab {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 900;
    }

    .tab.active {
      background: var(--greenFalabella);
      color: white;
      border-color: var(--greenFalabella);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stat small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      font-size: 25px;
      margin-top: 5px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .tab-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .manual-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 18px;
    }

    .manual-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .manual-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .manual-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .manual-grid .wide {
      grid-column: span 2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }

    .field textarea {
      min-height: 78px;
      resize: vertical;
    }

    .manual-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .admin-edit-panel {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }

    .admin-edit-panel h3 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 900;
    }

    .admin-auth-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      align-items: start;
    }

    .list-panel,
    .detail-panel,
    .master-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-title {
      padding: 15px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .sku-list {
      max-height: calc(100vh - 285px);
      overflow-y: auto;
    }

    .sku-item {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: grid;
      gap: 7px;
    }

    .sku-item:hover,
    .sku-item.active {
      background: rgba(143, 202, 0, .08);
    }

    .sku-item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .sku-code {
      font-size: 16px;
      font-weight: 900;
    }

    .sku-brand {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .pill-priority-1 { background: rgba(239, 68, 68, .13); color: var(--red); border-color: rgba(239, 68, 68, .25); }
    .pill-priority-2 { background: rgba(251, 146, 60, .14); color: var(--orange); border-color: rgba(251, 146, 60, .25); }
    .pill-priority-3 { background: rgba(250, 204, 21, .16); color: #ca8a04; border-color: rgba(250, 204, 21, .35); }
    .pill-priority-4 { background: rgba(163, 230, 53, .16); color: #65a30d; border-color: rgba(163, 230, 53, .28); }
    .pill-priority-5 { background: rgba(34, 197, 94, .14); color: var(--green); border-color: rgba(34, 197, 94, .28); }

    .status { background: var(--card2); color: var(--muted); border-color: var(--border); }
    .status-trabajo { background: rgba(59, 130, 246, .13); color: var(--blue); border-color: rgba(59, 130, 246, .25); }
    .status-revision { background: rgba(250, 204, 21, .17); color: #ca8a04; border-color: rgba(250, 204, 21, .32); }
    .status-aprobado { background: rgba(34, 197, 94, .14); color: var(--green); border-color: rgba(34, 197, 94, .28); }
    .status-rechazado { background: rgba(239, 68, 68, .13); color: var(--red); border-color: rgba(239, 68, 68, .25); }
    .status-descargado { background: rgba(34, 197, 94, .22); color: var(--green); border-color: rgba(34, 197, 94, .36); }

    .detail-content {
      padding: 18px;
    }

    .empty {
      padding: 30px;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .detail-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .detail-header small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 700;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .info-box {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .info-box small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .info-box span {
      white-space: pre-wrap;
      line-height: 1.35;
      font-size: 14px;
    }

    .prompt-box {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .upload-box {
      border: 2px dashed var(--border);
      background: var(--card2);
      border-radius: var(--radius);
      padding: 34px 20px;
      text-align: center;
      cursor: pointer;
      display: block;
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
    }

    .upload-box:hover,
    .upload-box.drag-over {
      border-color: var(--greenFalabella);
      background: rgba(143, 202, 0, .08);
      transform: translateY(-1px);
    }

    .upload-box strong {
      display: block;
      font-size: 17px;
      margin-bottom: 6px;
    }

    .upload-box small {
      color: var(--muted);
      line-height: 1.4;
    }

    .preview {
      margin-top: 14px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 260px;
      color: var(--muted);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .preview-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      display: grid;
      gap: 7px;
    }

    .preview-item img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      border-radius: 10px;
      background: var(--card2);
    }

    .preview-name {
      font-size: 11px;
      color: var(--muted);
      word-break: break-word;
      line-height: 1.25;
    }

    .upload-helper {
      margin-top: 12px;
      background: rgba(59, 130, 246, .08);
      border: 1px solid rgba(59, 130, 246, .20);
      border-radius: 14px;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .upload-helper strong {
      color: var(--text);
    }

    .review-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 16px;
      align-items: start;
    }

    .review-side {
      position: sticky;
      top: 96px;
      display: grid;
      gap: 12px;
      align-self: start;
    }

    .review-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .review-top input {
      width: 18px;
      height: 18px;
      accent-color: var(--greenFalabella);
    }

    .review-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .reject-box {
      display: grid;
      gap: 7px;
    }

    .reject-box label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .reject-box textarea {
      width: 100%;
      min-height: 108px;
      resize: vertical;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      line-height: 1.35;
    }

    .review-visual-area {
      min-width: 0;
    }

    .compare-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .compare-box {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-width: 0;
    }

    .compare-title {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .compare-title span {
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-image-frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--card2);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .compare-image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      cursor: zoom-in;
    }

    .compare-empty {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-weight: 900;
      padding: 20px;
      background: var(--card2);
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, .82);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .image-modal-content {
      width: min(96vw, 1320px);
      height: min(92vh, 900px);
      background: #111;
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .image-modal-title {
      color: white;
      font-weight: 900;
      font-size: 14px;
      word-break: break-word;
    }

    .image-modal-content img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
      border-radius: 12px;
      min-height: 0;
    }

    .image-modal-close {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 0;
      background: white;
      color: #111;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      z-index: 101;
    }

    .bulk-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .bulk-bar input {
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }

    .input-file {
      display: none;
    }

    .master-table-wrap {
      width: 100%;
      overflow: auto;
    }

    .master-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    .master-table th,
    .master-table td {
      padding: 12px 11px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .master-table th {
      background: var(--card2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .master-table tr:hover td {
      background: rgba(143, 202, 0, .05);
    }

    .master-sku {
      font-weight: 900;
      font-size: 14px;
    }

    .master-muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }


    .panel-title-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-assign {
      display: grid;
      gap: 6px;
      min-width: 165px;
    }

    .admin-assign select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 9px;
      outline: none;
      font-weight: 700;
      font-size: 12px;
    }

    .metrics-panel {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .metric-card small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 5px;
    }

    .metric-card strong {
      font-size: 28px;
      font-weight: 900;
    }

    .metrics-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .metrics-title h3 {
      margin: 0;
      font-size: 17px;
    }

    .bar-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 48px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      font-weight: 900;
    }

    .bar-track {
      height: 16px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--greenFalabella);
      border-radius: 999px;
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    .metrics-table th,
    .metrics-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 13px;
    }

    .metrics-table th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: var(--card2);
    }


    .top-right {
      position: relative;
    }

    .role-badge {
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .role-admin {
      background: rgba(143, 202, 0, .14);
      color: var(--greenDark);
      border-color: rgba(143, 202, 0, .28);
    }

    .role-retocador {
      background: rgba(59, 130, 246, .13);
      color: var(--blue);
      border-color: rgba(59, 130, 246, .25);
    }

    .role-revisor {
      background: rgba(250, 204, 21, .17);
      color: #ca8a04;
      border-color: rgba(250, 204, 21, .32);
    }

    .notification-wrap {
      position: relative;
    }

    .notification-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      cursor: pointer;
      font-size: 17px;
      position: relative;
    }

    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--red);
      color: white;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 900;
      border: 2px solid var(--card);
    }

    .notification-panel {
      position: absolute;
      top: 50px;
      right: 0;
      width: min(390px, 92vw);
      max-height: 430px;
      overflow-y: auto;
      z-index: 95;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .notification-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 7px 8px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
      font-weight: 900;
    }

    .notification-list {
      display: grid;
      gap: 8px;
    }

    .notification-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: var(--card2);
      display: grid;
      gap: 4px;
      font-size: 12px;
      line-height: 1.35;
    }

    .notification-item strong {
      font-size: 13px;
    }

    .notification-item small {
      color: var(--muted);
      font-weight: 700;
    }

    .notification-approved {
      border-color: rgba(34, 197, 94, .38);
      background: rgba(34, 197, 94, .12);
    }

    .notification-rejected {
      border-color: rgba(239, 68, 68, .38);
      background: rgba(239, 68, 68, .12);
    }

    .notification-review {
      border-color: rgba(250, 204, 21, .40);
      background: rgba(250, 204, 21, .13);
    }

    .detail-preview {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 14px;
      align-items: center;
    }

    .detail-preview-frame {
      width: 130px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .detail-preview-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: zoom-in;
    }

    .detail-preview-text small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 5px;
    }

    .detail-preview-text strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .detail-preview-text span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .bar-stack {
      height: 100%;
      display: flex;
      width: 100%;
    }

    .bar-fill-approved {
      height: 100%;
      background: var(--greenFalabella);
    }

    .bar-fill-rejected {
      height: 100%;
      background: var(--red);
    }

    .metric-legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin: 0 0 12px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 5px;
    }

    .legend-approved { background: var(--greenFalabella); }
    .legend-rejected { background: var(--red); }

    .bar-counts {
      font-size: 11px;
      color: var(--muted);
      font-weight: 900;
      white-space: nowrap;
    }

    .user-guide {
      display: none;
      position: absolute;
      top: 54px;
      right: 48px;
      z-index: 90;
      background: var(--card);
      color: var(--text);
      border: 1px solid rgba(143, 202, 0, .45);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      width: 230px;
      font-weight: 900;
      line-height: 1.25;
    }

    .user-guide small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .user-guide:before {
      content: "";
      position: absolute;
      top: -7px;
      right: 28px;
      width: 12px;
      height: 12px;
      background: var(--card);
      border-left: 1px solid rgba(143, 202, 0, .45);
      border-top: 1px solid rgba(143, 202, 0, .45);
      transform: rotate(45deg);
    }

    body.needs-user:before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(15, 23, 42, .46);
      backdrop-filter: grayscale(1) blur(1px);
      pointer-events: none;
    }

    body.needs-user .topbar {
      z-index: 70;
    }

    body.needs-user .main {
      filter: grayscale(1);
      opacity: .35;
      pointer-events: none;
      user-select: none;
    }

    body.needs-user .lock-message {
      position: relative;
      z-index: 80;
      pointer-events: auto;
    }

    body.needs-user #currentUser {
      position: relative;
      z-index: 90;
      background: white;
      color: #1f2933;
      border-color: var(--greenFalabella);
      box-shadow: 0 0 0 7px rgba(143, 202, 0, .25), 0 14px 36px rgba(0, 0, 0, .20);
      animation: userPulse 1.15s ease-in-out infinite;
    }

    body.needs-user .user-guide {
      display: block;
    }

    @keyframes userPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      background: #111827;
      color: white;
      padding: 13px 15px;
      border-radius: 14px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
      font-weight: 900;
      display: none;
      max-width: 360px;
    }

    body.dark .toast {
      background: white;
      color: #111;
    }

    @media (max-width: 1000px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; }
      .top-right { width: 100%; justify-content: space-between; }
      .layout, .review-card, .compare-pair { grid-template-columns: 1fr; }
      .review-side { position: static; }
      .compare-image-frame, .compare-empty { min-height: 0; }
      .stats, .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .bar-row { grid-template-columns: 90px 1fr 42px; }
      .bulk-bar { grid-template-columns: 1fr; }
      .manual-grid { grid-template-columns: 1fr; }
      .manual-grid .wide { grid-column: span 1; }
      .info-grid { grid-template-columns: 1fr; }
      .detail-preview { grid-template-columns: 1fr; }
      .detail-preview-frame { width: 100%; max-width: 220px; }
      .sku-list { max-height: none; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo-box">IA</div>
        <div>
          <h1>Flujo IA <span class="version">V1.0.2</span></h1>
          <small>Falabella Chile</small>
        </div>
      </div>

      <div class="top-right">
        <select id="currentUser" class="user-select" onchange="handleUserChange()">
          <option value="">Seleccionar usuario</option>
          <option>Pablo</option>
          <option>Mylena</option>
          <option>Fernanda</option>
          <option>Fernando</option>
          <option>Marcos</option>
          <option>Mica</option>
          <option>Kathe</option>
          <option>Cesar</option>
          <option>Michelle</option>
          <option>Sandra</option>
          <option>Rossana</option>
          <option>Sebastian</option>
        </select>

        <span id="userRoleBadge" class="role-badge hidden"></span>

        <div id="notificationWrap" class="notification-wrap hidden">
          <button id="notificationBtn" class="notification-btn" onclick="toggleNotificationsPanel()" title="Notificaciones">
            🔔
            <span id="notificationBadge" class="notification-badge hidden">0</span>
          </button>
          <div id="notificationPanel" class="notification-panel hidden"></div>
        </div>

        <div id="userGuide" class="user-guide">
          Elegir usuario
          <small>Selecciona tu perfil. Si es Admin, se pedirá la clave al elegirlo.</small>
        </div>

        <button id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="Modo oscuro">🌙</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="lockMessage" class="lock-message">
      Configura Firebase y selecciona tu usuario para comenzar.
    </div>

    <section id="stats" class="stats"></section>

    <nav class="tabs">
      <button class="tab active" data-tab="work" onclick="setTab('work')">SKU a trabajar</button>
      <button class="tab" data-tab="upload" onclick="setTab('upload')">Subir trabajado</button>
      <button class="tab" data-tab="review" onclick="setTab('review')">Revisión</button>
      <button class="tab" data-tab="master" onclick="setTab('master')">Master</button>
    </nav>

    <section id="view-work" class="view active">
      <div class="tab-actions">
        <button id="manualBtn" class="btn btn-soft" onclick="toggleManualPanel()" disabled>Agregar manual</button>
        <button id="loadExcelBtn" class="btn btn-primary" onclick="document.getElementById('excelInput').click()" disabled>Cargar Excel</button>
        <button id="templateBtn" class="btn btn-soft" onclick="downloadTemplate()" disabled>Descargar plantilla</button>
        <input id="excelInput" class="input-file" type="file" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(event)" />
      </div>

      <section id="manualPanel" class="manual-panel hidden">
        <div class="manual-title">
          <h2>Agregar SKU manual</h2>
          <button class="btn btn-soft btn-small" onclick="toggleManualPanel()">Cerrar</button>
        </div>

        <div class="manual-grid">
          <div class="field">
            <label>SKU *</label>
            <input id="manualSku" placeholder="Ej: 123456789" />
          </div>

          <div class="field">
            <label>Marca *</label>
            <input id="manualMarca" placeholder="Ej: Basement" />
          </div>

          <div class="field">
            <label>Prioridad *</label>
            <select id="manualPrioridad">
              <option value="1">1 · Urgente</option>
              <option value="2">2 · Alta</option>
              <option value="3">3 · Media</option>
              <option value="4">4 · Baja</option>
              <option value="5" selected>5 · Normal</option>
            </select>
          </div>

          <div class="field">
            <label>Medidas</label>
            <input id="manualMedidas" placeholder="Ej: 120 x 80 x 40 cm" />
          </div>

          <div class="field wide">
            <label>Descripción / Comentario</label>
            <textarea id="manualComentario" placeholder="Ej: Usar ambientación limpia, moderna y cálida."></textarea>
          </div>
        </div>

        <div class="manual-actions">
          <button class="btn btn-soft" onclick="clearManualForm()">Limpiar</button>
          <button class="btn btn-primary" onclick="addManualSku()">Agregar SKU</button>
        </div>
      </section>

      <div class="layout">
        <div class="list-panel">
          <div class="panel-title">
            <span>Pendientes / Rechazados</span>
            <span id="workCount" class="pill status"></span>
          </div>
          <div id="workList" class="sku-list"></div>
        </div>

        <div class="detail-panel">
          <div class="panel-title">Detalle del SKU</div>
          <div id="workDetail" class="detail-content"></div>
        </div>
      </div>
    </section>

    <section id="view-upload" class="view">
      <div class="layout">
        <div class="list-panel">
          <div class="panel-title">
            <span>Mis SKUs tomados</span>
            <span id="uploadCount" class="pill status"></span>
          </div>
          <div id="uploadList" class="sku-list"></div>
        </div>

        <div class="detail-panel">
          <div class="panel-title">Subir imagen trabajada</div>
          <div id="uploadDetail" class="detail-content"></div>
        </div>
      </div>
    </section>

    <section id="view-review" class="view">
      <div class="bulk-bar">
        <input id="bulkReason" placeholder="Motivo de rechazo múltiple opcional. Si queda vacío, usa el motivo escrito en cada tarjeta." />
        <button class="btn btn-soft" onclick="toggleSelectAllReviews()">Seleccionar / limpiar todos</button>
        <button class="btn btn-primary" onclick="approveSelected()">Aprobar y descargar seleccionados</button>
        <button class="btn btn-red" onclick="rejectSelected()">Rechazar seleccionados</button>
      </div>

      <div id="reviewList"></div>
    </section>

    <section id="view-master" class="view">
      <div class="master-panel">
        <div class="panel-title">
          <span>Master de registro</span>
          <div class="panel-title-actions">
            <button id="metricsBtn" class="btn btn-soft btn-small hidden" onclick="toggleMetricsPanel()">Métricas</button>
            <span id="masterCount" class="pill status"></span>
          </div>
        </div>

        <div id="metricsPanel" class="metrics-panel hidden"></div>
        <div id="masterTable"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <div id="imageModal" class="image-modal hidden" onclick="closeImageModal(event)">
    <button class="image-modal-close" onclick="closeImageModal(event)">×</button>
    <div class="image-modal-content" onclick="event.stopPropagation()">
      <div id="imageModalTitle" class="image-modal-title"></div>
      <img id="imageModalImg" src="" alt="Vista ampliada" />
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getStorage,
      ref as storageRef,
      uploadBytes,
      getBlob,
      getDownloadURL,
      deleteObject
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    const APP_VERSION = "V1.0.2";
    const BUSINESS_UNIT = "falabella";
    const PAIS = "CL";
    const COLLECTION_NAME = "flujo_ia_skus";
    const STORAGE_ROOT = "flujo-ia/imagenes";

const firebaseConfig = {
      apiKey: "AIzaSyD4Uju0DEyYGgpAeTQi-xSbWd10wy7cfJc",
      authDomain: "flujo-ia.firebaseapp.com",
      projectId: "flujo-ia",
      storageBucket: "flujo-ia.firebasestorage.app",
      messagingSenderId: "500202381796",
      appId: "1:500202381796:web:20d93a25cf0e5d1e9627f1"
    };

    const STATUS = {
      PENDIENTE: "Pendiente",
      TRABAJO: "En trabajo",
      REVISION: "En revisión",
      APROBADO: "Aprobado",
      RECHAZADO: "Rechazado",
      DESCARGADO: "Descargado"
    };

    const SAVED_USER_KEY = "flujo_ia_current_user";
    const READ_NOTIFICATIONS_KEY = "flujo_ia_read_notifications";
    const ADMIN_UNLOCK_KEY = "flujo_ia_admin_unlocked_user";
    const ADMIN_PIN = "0000";

    const ROLES = {
      ADMIN: "admin",
      RETOCADOR: "retocador",
      REVISOR: "revisor"
    };

    const ROLE_LABELS = {
      [ROLES.ADMIN]: "Admin",
      [ROLES.RETOCADOR]: "Retocador",
      [ROLES.REVISOR]: "Revisor"
    };

    const USER_ROLES = {
      Pablo: ROLES.ADMIN,
      Mica: ROLES.ADMIN,
      Mylena: ROLES.RETOCADOR,
      Fernanda: ROLES.RETOCADOR,
      Fernando: ROLES.RETOCADOR,
      Marcos: ROLES.RETOCADOR,
      Sebastian: ROLES.RETOCADOR,
      Michelle: ROLES.RETOCADOR,
      Cesar: ROLES.RETOCADOR,
      Kathe: ROLES.RETOCADOR,
      Sandra: ROLES.REVISOR,
      Rossana: ROLES.REVISOR
    };

    const ROLE_TABS = {
      [ROLES.ADMIN]: ["work", "upload", "review", "master"],
      [ROLES.RETOCADOR]: ["work", "upload", "master"],
      [ROLES.REVISOR]: ["review", "master"]
    };

    let firebaseReady = false;
    let db = null;
    let storage = null;
    let records = [];
    let activeTab = "work";
    let selectedWorkId = "";
    let selectedUploadId = "";
    let editingWorkId = "";
    let unsubscribeRecords = null;
    let userPickerAttempted = false;
    const pos1Cache = {};

    document.addEventListener("DOMContentLoaded", async () => {
      loadTheme();
      restoreSavedUser();
      initFirebase();
      renderEmptyBase();
      lockByUser();
      requestUserSelectionAttention();
    });

    function initFirebase() {
      const configured = firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("PEGA_AQUI");

      if (!configured) {
        firebaseReady = false;
        document.getElementById("lockMessage").innerHTML = `
          Falta configurar Firebase en el código.<br>
          Reemplaza el bloque <strong>firebaseConfig</strong> con los datos de tu proyecto Firebase.
        `;
        return;
      }

      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        storage = getStorage(app);
        firebaseReady = true;
        listenRecords();
      } catch (error) {
        console.error(error);
        firebaseReady = false;
        document.getElementById("lockMessage").textContent = "No se pudo iniciar Firebase. Revisa firebaseConfig.";
      }
    }

    function listenRecords() {
      if (!firebaseReady) return;
      if (unsubscribeRecords) unsubscribeRecords();

      unsubscribeRecords = onSnapshot(
        collection(db, COLLECTION_NAME),
        snapshot => {
          records = snapshot.docs.map(item => {
            const data = item.data();
            return migrateRecord({ ...data, id: item.id });
          });

          refresh();
        },
        error => {
          console.error(error);
          alert("No se pudo leer la base de datos de Firebase. Revisa reglas/permisos de Firestore.");
        }
      );
    }

    function migrateRecord(record) {
      if (!Array.isArray(record.generatedImages)) record.generatedImages = [];
      if (!Array.isArray(record.uploadEvents)) record.uploadEvents = [];
      if (!Array.isArray(record.reviewEvents)) record.reviewEvents = [];
      if (!record.version) record.version = 1;
      if (record.rejectionCount === undefined || record.rejectionCount === null) {
        record.rejectionCount = Math.max(Number(record.version || 1) - 1, 0);
      }
      if (!record.prompt) record.prompt = buildPrompt(record);
      if (!record.estado) record.estado = STATUS.PENDIENTE;
      if (!record.lastImageNames) record.lastImageNames = "";

      if (!record.editor && [STATUS.TRABAJO, STATUS.REVISION, STATUS.RECHAZADO].includes(record.estado)) {
        const possibleSources = [
          ...record.uploadEvents,
          ...record.generatedImages
        ]
          .filter(item => item && (item.editor || item.uploadedBy))
          .sort((a, b) => new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0));

        const inferredEditor = possibleSources[0]?.editor || possibleSources[0]?.uploadedBy || "";
        if (inferredEditor && inferredEditor !== "Sin editor") record.editor = inferredEditor;
      }

      return record;
    }

    async function saveRecord(record) {
      if (!firebaseReady) {
        alert("Firebase no está configurado.");
        return;
      }

      const clean = JSON.parse(JSON.stringify(record));
      await setDoc(doc(db, COLLECTION_NAME, clean.id), clean, { merge: true });
    }

    function currentUser() {
      return document.getElementById("currentUser").value.trim();
    }

    function getUserRole(user = currentUser()) {
      return USER_ROLES[user] || "";
    }

    function isAdminProfile(user = currentUser()) {
      return getUserRole(user) === ROLES.ADMIN;
    }

    function isAdminUnlocked(user = currentUser()) {
      if (!isAdminProfile(user)) return true;
      return sessionStorage.getItem(ADMIN_UNLOCK_KEY) === user;
    }

    function hasActiveUserAccess(user = currentUser()) {
      const role = getUserRole(user);
      if (!user || !role) return false;
      if (role === ROLES.ADMIN && !isAdminUnlocked(user)) return false;
      return true;
    }

    function isAdmin() {
      const user = currentUser();
      return getUserRole(user) === ROLES.ADMIN && isAdminUnlocked(user);
    }

    function canAccessTab(tab) {
      if (!hasActiveUserAccess()) return false;
      const role = getUserRole();
      return Boolean(role && ROLE_TABS[role] && ROLE_TABS[role].includes(tab));
    }

    function restoreSavedUser() {
      const select = document.getElementById("currentUser");
      const savedUser = localStorage.getItem(SAVED_USER_KEY);

      if (!select || !savedUser) return;

      const exists = [...select.options].some(option => option.value === savedUser);
      if (!exists) return;

      // Los perfiles Admin no se restauran automáticamente si no tienen clave activa.
      // Así evitamos que Pablo/Mica entren o queden bloqueados al abrir la página.
      if (getUserRole(savedUser) === ROLES.ADMIN && sessionStorage.getItem(ADMIN_UNLOCK_KEY) !== savedUser) {
        localStorage.removeItem(SAVED_USER_KEY);
        return;
      }

      select.value = savedUser;
    }

    function updateSavedUser() {
      const user = currentUser();

      if (user) {
        localStorage.setItem(SAVED_USER_KEY, user);
      } else {
        localStorage.removeItem(SAVED_USER_KEY);
      }
    }

    function requireUser() {
      if (!firebaseReady) {
        alert("Primero configura Firebase en el código.");
        return false;
      }

      if (!currentUser()) {
        alert("Primero selecciona tu usuario.");
        requestUserSelectionAttention(true);
        return false;
      }

      if (!getUserRole()) {
        alert("Este usuario no tiene un rol configurado.");
        return false;
      }

      if (isAdminProfile() && !isAdminUnlocked()) {
        alert("Este perfil Admin requiere clave antes de usar la página.");
        return false;
      }

      return true;
    }

    function requireAdmin() {
      if (!requireUser()) return false;

      if (!isAdmin()) {
        alert("Esta acción está disponible solo para perfiles Admin.");
        return false;
      }

      return true;
    }

    async function requestAdminUnlockForUser(user) {
      if (!isAdminProfile(user)) return true;
      if (isAdminUnlocked(user)) return true;

      const pin = prompt(`Clave Admin para ${user}:`);

      if (pin === null) {
        return false;
      }

      if (pin !== ADMIN_PIN) {
        alert("Clave Admin incorrecta.");
        return false;
      }

      sessionStorage.setItem(ADMIN_UNLOCK_KEY, user);
      toast(`Acceso Admin habilitado para ${user}.`);
      return true;
    }

    async function unlockAdminProfile() {
      const user = currentUser();

      if (!isAdminProfile(user)) {
        alert("Selecciona Pablo o Mica para usar acceso Admin.");
        return;
      }

      const unlocked = await requestAdminUnlockForUser(user);

      if (!unlocked) {
        document.getElementById("currentUser").value = "";
        sessionStorage.removeItem(ADMIN_UNLOCK_KEY);
        updateSavedUser();
      }

      lockByUser();
      await refresh();
    }

    function requireTabAccess(tab) {
      if (!requireUser()) return false;

      if (!canAccessTab(tab)) {
        alert("Tu perfil no tiene acceso a esta pestaña.");
        return false;
      }

      return true;
    }

    async function handleUserChange() {
      const select = document.getElementById("currentUser");
      const user = currentUser();
      userPickerAttempted = Boolean(user);

      if (isAdminProfile(user) && !isAdminUnlocked(user)) {
        const unlocked = await requestAdminUnlockForUser(user);

        if (!unlocked) {
          if (select) select.value = "";
          sessionStorage.removeItem(ADMIN_UNLOCK_KEY);
          updateSavedUser();
          lockByUser();
          await refresh();
          requestUserSelectionAttention(true);
          return;
        }
      }

      updateSavedUser();
      lockByUser();
      await refresh();
    }

    function requestUserSelectionAttention(force = false) {
      if (currentUser()) return;
      if (userPickerAttempted && !force) return;

      userPickerAttempted = true;

      setTimeout(() => {
        const select = document.getElementById("currentUser");
        if (!select || currentUser()) return;

        try {
          select.focus({ preventScroll: true });
        } catch {
          select.focus();
        }

        if (typeof select.showPicker === "function") {
          try {
            select.showPicker();
          } catch {
            // Algunos navegadores bloquean abrir el selector sin interacción directa del usuario.
          }
        }
      }, 450);
    }

    function updateUserRoleBadge() {
      const badge = document.getElementById("userRoleBadge");
      if (!badge) return;

      const role = getUserRole();

      if (!currentUser() || !role) {
        badge.className = "role-badge hidden";
        badge.textContent = "";
        return;
      }

      badge.className = `role-badge role-${role}`;
      badge.textContent = role === ROLES.ADMIN && !isAdminUnlocked() ? "Admin bloqueado" : (ROLE_LABELS[role] || role);

    function syncActiveTabUi() {
      const user = currentUser();
      const role = getUserRole();
      const enabled = Boolean(user) && firebaseReady && Boolean(role) && hasActiveUserAccess(user);
      const allowedTabs = ROLE_TABS[role] || [];

      if (enabled && !allowedTabs.includes(activeTab)) {
        activeTab = allowedTabs[0] || "work";
      }

      document.querySelectorAll(".tab").forEach(tab => {
        const tabName = tab.dataset.tab;
        const allowed = enabled ? allowedTabs.includes(tabName) : true;

        tab.disabled = !enabled || !allowed;
        tab.classList.toggle("hidden", enabled && !allowed);
        tab.classList.toggle("active", enabled && tabName === activeTab);
      });

      document.querySelectorAll(".view").forEach(view => {
        view.classList.remove("active");
      });

      const activeView = document.getElementById(`view-${activeTab}`);
      if (activeView) activeView.classList.add("active");
    }

    function lockByUser() {
      const user = currentUser();
      const role = getUserRole(user);
      const enabled = Boolean(user) && firebaseReady && Boolean(role) && hasActiveUserAccess(user);
      const admin = enabled && role === ROLES.ADMIN;
      const adminLocked = Boolean(user) && firebaseReady && role === ROLES.ADMIN && !isAdminUnlocked(user);
      const lockMessage = document.getElementById("lockMessage");

      ["loadExcelBtn", "manualBtn", "templateBtn"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        el.disabled = !admin;
        el.classList.toggle("hidden", enabled && !admin);
      });

      if (lockMessage) {
        if (!firebaseReady) {
          lockMessage.innerHTML = `
            Falta configurar Firebase o no se pudo conectar.<br>
            Revisa la configuración del proyecto Firebase.
          `;
        } else if (!user) {
          lockMessage.innerHTML = `
            <strong>Elegir usuario</strong><br>
            Selecciona tu perfil en la esquina superior derecha para comenzar.
          `;
        } else if (!role) {
          lockMessage.innerHTML = `
            <strong>Usuario sin rol</strong><br>
            Este perfil no tiene permisos configurados.
          `;
        } else if (adminLocked) {
          lockMessage.innerHTML = `
            <strong>Perfil Admin protegido</strong><br>
            Vuelve a seleccionar Pablo/Mica para ingresar la clave o cambia a otro usuario.
            <div class="admin-auth-actions">
              <button class="btn btn-primary" onclick="unlockAdminProfile()">Ingresar clave Admin</button>
              <button class="btn btn-soft" onclick="document.getElementById('currentUser').value=''; handleUserChange();">Cambiar usuario</button>
            </div>
          `;
        }

        lockMessage.classList.toggle("hidden", enabled);
      }

      document.body.classList.toggle("needs-user", !enabled);
      updateUserRoleBadge();
      syncActiveTabUi();

      if (!enabled && !adminLocked) requestUserSelectionAttention();
    }

    function endpointBySku(sku) {
      return `https://sellercenter.falabella-marketplace.services/media-service/v1/reference/${encodeURIComponent(sku)}?businessUnit=${BUSINESS_UNIT}&country=${PAIS}`;

    function buildFalabellaViewUrl(sku, view = "1") {
      const cleanSku = String(sku || "").trim();
      const cleanView = String(view || "1").replace(/^_+/, "").trim() || "1";
      if (!cleanSku) return "";
      return `https://media.falabella.com/falabellaCL/${encodeURIComponent(cleanSku)}_${encodeURIComponent(cleanView)}/w=1500,h=1500,fit=pad`;
    }

    function buildDirectMediaItems(sku, maxViews = 12) {
      const total = Math.max(Number(maxViews || 12), 1);
      return Array.from({ length: total }, (_, index) => {
        const view = String(index + 1);
        return {
          url: buildFalabellaViewUrl(sku, view),
          position: index + 1,
          direct: true
        };
      });
    }

    function buildPrompt(record) {
      const marca = record.marca || "sin marca indicada";
      const medidas = record.medidas || "sin medidas indicadas";
      const comentario = record.comentario || "sin comentario adicional";

      return `Ambientar este producto de forma realista, comercial y atractiva para ecommerce, manteniendo el producto como protagonista principal.

SKU: ${record.sku}
Marca: ${marca}
Medidas: ${medidas}
Comentario adicional: ${comentario}

Instrucciones:
- Mantener forma, color, proporciones, materialidad y detalles reales del producto.
- No cambiar logos, textos, estampados, diseño, textura ni colores principales.
- Crear una escena limpia, moderna y coherente con una imagen comercial de retail.
- Usar iluminación natural o de estudio suave.
- Evitar fondos saturados, elementos distractores o composición poco realista.
- La ambientación debe ayudar a entender el uso del producto y mejorar su atractivo visual.
- Resultado final profesional, ordenado y apto para publicación ecommerce.`;
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function normalizeHeader(value) {
      return normalizeText(value).replace(/[^a-z0-9]/g, "");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeFileName(value) {
      return String(value || "archivo")
        .trim()
        .replace(/[\\/:*?"<>|]/g, "-")
        .replace(/\s+/g, "_");
    }

    function uid() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "id_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    }

    function formatDate(value) {
      if (!value) return "";

      try {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "";

        const pad = n => String(n).padStart(2, "0");
        return `${pad(d.getDate())}-${pad(d.getMonth() + 1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } catch {
        return "";
      }
    }

    function dateStamp() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.style.display = "block";

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        el.style.display = "none";
      }, 2800);
    }

    function readNotificationKeys() {
      try {
        return JSON.parse(localStorage.getItem(READ_NOTIFICATIONS_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveNotificationKeys(keys) {
      const unique = [...new Set(keys)].slice(-600);
      localStorage.setItem(READ_NOTIFICATIONS_KEY, JSON.stringify(unique));
    }

    function notificationTimestamp(record) {
      return record.reviewedAt || record.downloadedAt || record.uploadedAt || record.updatedAt || record.createdAt || "";
    }

    function buildNotificationsForCurrentUser() {
      const user = currentUser();
      const role = getUserRole(user);
      if (!user || !role || role === ROLES.ADMIN) return [];

      const items = [];

      records.forEach(record => {
        if (role === ROLES.RETOCADOR && record.editor === user) {
          if (record.estado === STATUS.DESCARGADO) {
            const ts = notificationTimestamp(record);
            items.push({
              key: `${record.id}|approved|${ts}`,
              type: "approved",
              title: `SKU aprobado: ${record.sku}`,
              text: `Tu imagen fue aprobada y descargada.`,
              date: ts
            });
          }

          if (record.estado === STATUS.RECHAZADO) {
            const ts = notificationTimestamp(record);
            items.push({
              key: `${record.id}|rejected|${ts}`,
              type: "rejected",
              title: `SKU rechazado: ${record.sku}`,
              text: record.motivoRechazo ? `Motivo: ${record.motivoRechazo}` : "Revisa el motivo en el detalle del SKU.",
              date: ts
            });
          }
        }

        if (role === ROLES.REVISOR && record.estado === STATUS.REVISION) {
          const ts = record.uploadedAt || record.updatedAt || record.createdAt || "";
          items.push({
            key: `${record.id}|review|${ts}`,
            type: "review",
            title: `Nuevo SKU en revisión: ${record.sku}`,
            text: `Editor: ${record.editor || "Sin editor"}. ${getRecordImages(record).length} imagen(es) para revisar.`,
            date: ts
          });
        }
      });

      return items.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)).slice(0, 80);
    }

    function renderNotifications() {
      const wrap = document.getElementById("notificationWrap");
      const badge = document.getElementById("notificationBadge");
      const panel = document.getElementById("notificationPanel");
      if (!wrap || !badge || !panel) return;

      const role = getUserRole();
      const enabled = Boolean(currentUser()) && (role === ROLES.RETOCADOR || role === ROLES.REVISOR);
      wrap.classList.toggle("hidden", !enabled);

      if (!enabled) {
        panel.classList.add("hidden");
        badge.classList.add("hidden");
        badge.textContent = "0";
        panel.innerHTML = "";
        return;
      }

      const notifications = buildNotificationsForCurrentUser();
      const read = new Set(readNotificationKeys());
      const unread = notifications.filter(item => !read.has(item.key)).length;

      badge.textContent = unread > 99 ? "99+" : String(unread);
      badge.classList.toggle("hidden", unread === 0);

      if (panel.classList.contains("hidden")) return;

      panel.innerHTML = `
        <div class="notification-head">
          <span>Notificaciones</span>
          <button class="btn btn-soft btn-small" onclick="markNotificationsRead()">Marcar leídas</button>
        </div>
        ${notifications.length ? `
          <div class="notification-list">
            ${notifications.map(item => `
              <div class="notification-item notification-${item.type}">
                <strong>${escapeHtml(item.title)}</strong>
                <div>${escapeHtml(item.text)}</div>
                <small>${formatDate(item.date) || "Sin fecha"}${read.has(item.key) ? " · Leída" : " · Nueva"}</small>
              </div>
            `).join("")}
          </div>
        ` : `<div class="empty" style="padding:18px;">No tienes notificaciones.</div>`}
      `;
    }

    function toggleNotificationsPanel() {
      const panel = document.getElementById("notificationPanel");
      if (!panel) return;
      panel.classList.toggle("hidden");
      renderNotifications();
    }

    function markNotificationsRead() {
      const notifications = buildNotificationsForCurrentUser();
      const read = readNotificationKeys();
      saveNotificationKeys([...read, ...notifications.map(item => item.key)]);
      renderNotifications();
    }

    function getRecord(id) {

    }

    function priorityNumber(value) {
      const raw = normalizeText(value);

      if (!raw) return 5;

      const colorMap = {
        "rojo": 1,
        "urgente": 1,
        "naranjo": 2,
        "naranja": 2,
        "alta": 2,
        "amarillo": 3,
        "media": 3,
        "verde limon": 4,
        "verdelimon": 4,
        "baja": 4,
        "verde": 5,
        "normal": 5
      };

      if (colorMap[raw]) return colorMap[raw];

      const number = parseInt(raw, 10);
      if (Number.isNaN(number)) return 5;

      return Math.min(Math.max(number, 1), 5);
    }

    function isValidPriority(value) {
      const raw = normalizeText(value);
      if (!raw) return false;

      const accepted = [
        "1", "2", "3", "4", "5",
        "rojo", "urgente",
        "naranjo", "naranja", "alta",
        "amarillo", "media",
        "verde limon", "verdelimon", "baja",
        "verde", "normal"
      ];

      return accepted.includes(raw);
    }

    function priorityLabel(priority) {
      const p = priorityNumber(priority);
      const labels = { 1: "Urgente", 2: "Alta", 3: "Media", 4: "Baja", 5: "Normal" };
      return labels[p] || "Normal";
    }

    function priorityPill(priority) {
      const p = priorityNumber(priority);
      return `<span class="pill pill-priority-${p}">${p} · ${priorityLabel(p)}</span>`;
    }

    function statusPill(status) {
      let cls = "status";

      if (status === STATUS.TRABAJO) cls = "status-trabajo";
      if (status === STATUS.REVISION) cls = "status-revision";
      if (status === STATUS.APROBADO) cls = "status-aprobado";
      if (status === STATUS.RECHAZADO) cls = "status-rechazado";
      if (status === STATUS.DESCARGADO) cls = "status-descargado";

      return `<span class="pill ${cls}">${escapeHtml(status)}</span>`;
    }

    function sortByPriority(list) {
      return [...list].sort((a, b) => {
        const pa = priorityNumber(a.prioridad);
        const pb = priorityNumber(b.prioridad);
        if (pa !== pb) return pa - pb;
        return new Date(a.createdAt || 0) - new Date(b.createdAt || 0);
      });
    }

    function findColumn(row, candidates) {
      const keys = Object.keys(row || {});

      for (const candidate of candidates) {
        const found = keys.find(key => {
          const normalized = normalizeHeader(key);
          return normalized === candidate || normalized.includes(candidate);
        });

        if (found) return found;
      }

      return null;
    }

    function createRecord({ sku, marca, medidas, comentario, prioridad }) {
      const record = {
        id: uid(),
        sku: String(sku || "").trim(),
        marca: String(marca || "").trim(),
        medidas: String(medidas || "").trim(),
        comentario: String(comentario || "").trim(),
        prioridad: priorityNumber(prioridad),
        estado: STATUS.PENDIENTE,
        editor: "",
        revisor: "",
        motivoRechazo: "",
        version: 1,
        rejectionCount: 0,
        uploadEvents: [],
        generatedImages: [],
        generatedImageId: "",
        generatedImageName: "",
        lastImageNames: "",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        takenAt: "",
        uploadedAt: "",
        reviewedAt: "",
        downloadedAt: ""
      };

      record.prompt = buildPrompt(record);
      return record;
    }

      const key = normalizeText(sku);
      return records.some(record => normalizeText(record.sku) === key);

    async function handleExcelUpload(event) {
      if (!requireAdmin()) {
        event.target.value = "";
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      try {
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

        if (!rows.length) {
          alert("El Excel está vacío.");
          event.target.value = "";
          return;
        }

        const first = rows[0];
        const skuCol = findColumn(first, ["sku", "codigo", "codigoproducto", "idproducto"]);
        const marcaCol = findColumn(first, ["marca", "brand", "proveedor"]);
        const medidasCol = findColumn(first, ["medidas", "medida"]);
        const comentarioCol = findColumn(first, ["descripcioncomentario", "comentario", "descripcion", "observacion", "observaciones", "detalle"]);
        const prioridadCol = findColumn(first, ["prioridad", "urgencia", "nivel"]);

        const missing = [];
        if (!skuCol) missing.push("SKU");
        if (!marcaCol) missing.push("Marca");
        if (!prioridadCol) missing.push("Prioridad");

        if (missing.length) {
          alert(
            "El Excel no tiene el formato correcto.\n\n" +
            "Faltan estas columnas obligatorias:\n" +
            missing.join(", ") +
            "\n\nDescarga la plantilla desde la página para evitar errores."
          );

          event.target.value = "";
          return;
        }

        let added = 0;
        let duplicated = 0;
        let incomplete = 0;
        let correctedPriority = 0;
        const writes = [];

        rows.forEach(row => {
          const sku = String(row[skuCol] || "").trim();
          const marca = String(row[marcaCol] || "").trim();
          const prioridadRaw = String(row[prioridadCol] || "").trim();

          if (!sku || !marca) {
            incomplete++;
            return;
          }

          if (skuAlreadyExists(sku)) {
            duplicated++;
            return;
          }

          if (!isValidPriority(prioridadRaw)) correctedPriority++;

          const record = createRecord({
            sku,
            marca,
            medidas: medidasCol ? row[medidasCol] : "",
            comentario: comentarioCol ? row[comentarioCol] : "",
            prioridad: isValidPriority(prioridadRaw) ? prioridadRaw : 5
          });

          records.push(record);
          writes.push(saveRecord(record));
          added++;
        });

        await Promise.all(writes);

        event.target.value = "";
        selectedWorkId = "";
        selectedUploadId = "";
        await refresh();

        alert(
          "Carga finalizada.\n\n" +
          `Agregados: ${added}\n` +
          `Duplicados omitidos: ${duplicated}\n` +
          `Filas incompletas omitidas: ${incomplete}\n` +
          `Prioridades corregidas a normal: ${correctedPriority}`
        );
      } catch (error) {
        console.error(error);
        alert("No se pudo leer el Excel. Revisa que sea un archivo .xlsx, .xls o .csv válido.");
        event.target.value = "";
      }
    }

    async function refresh() {
      lockByUser();
      renderStats();
      renderNotifications();

      renderWorkDetail();

      await renderReviewList();

      renderStats();

      renderWorkList();

      renderMasterTable();

        [STATUS.APROBADO]: 0,
        [STATUS.RECHAZADO]: 0,

      records.forEach(record => {

        <div class="stat"><small>Aprobados</small><strong>${count[STATUS.APROBADO] + count[STATUS.DESCARGADO]}</strong></div>
        <div class="stat"><small>Rechazados</small><strong>${count[STATUS.RECHAZADO]}</strong></div>

      selectedWorkId = id;

    function selectUpload(id) {
      if (!requireTabAccess("upload")) return;

      renderUploadList();
      renderUploadDetail();

      const list = sortByPriority(records).filter(record => {

          return record.estado === STATUS.PENDIENTE ||
            record.estado === STATUS.RECHAZADO ||
            record.estado === STATUS.TRABAJO;
        }

        if (role === ROLES.RETOCADOR) {
          if (record.estado === STATUS.PENDIENTE) return true;
          if ((record.estado === STATUS.RECHAZADO || record.estado === STATUS.TRABAJO) && record.editor === user) return true;

      renderWorkDetail();

    async function saveAdminSkuDetails(id) {
      if (!requireAdmin()) return;

      const record = getRecord(id);
      if (!record) return;

      record.marca = document.getElementById("editMarca")?.value.trim() || "";
      record.prioridad = priorityNumber(document.getElementById("editPrioridad")?.value || record.prioridad);
      record.medidas = document.getElementById("editMedidas")?.value.trim() || "";
      record.comentario = document.getElementById("editComentario")?.value.trim() || "";
      record.prompt = buildPrompt(record);
      record.updatedAt = new Date().toISOString();

      await saveRecord(record);
      editingWorkId = "";
      await refresh();
      toast(`SKU ${record.sku} actualizado.`);
    }

    async function takeWork(id) {
      if (!requireTabAccess("work")) return;

      const record = getRecord(id);
      if (!record) return;

      if (record.estado === STATUS.RECHAZADO && record.editor && record.editor !== currentUser() && !isAdmin()) {
        alert(`Este rechazo está asignado a ${record.editor}. Debe volver a trabajarlo el mismo usuario.`);
        return;
      }

      record.estado = STATUS.TRABAJO;
      record.editor = record.editor || currentUser();
      if (!isAdmin() || !record.editor) record.editor = currentUser();
      record.takenAt = record.takenAt || new Date().toISOString();
      record.updatedAt = new Date().toISOString();

      await saveRecord(record);
      selectedUploadId = record.id;
      await refresh();
      toast(`SKU asignado a ${record.editor}.`);
    }

    function getUploadCandidateRecords() {
      const user = currentUser();

      return sortByPriority(records).filter(record => {
        const uploadableStatus = record.estado === STATUS.TRABAJO || record.estado === STATUS.RECHAZADO;
        if (!uploadableStatus) return false;
        if (isAdmin()) return true;
        return record.editor === user;
      });
    }

    function renderUploadList() {
      const user = currentUser();
      const list = getUploadCandidateRecords();

      if (countEl) countEl.textContent = list.length;

      const el = document.getElementById("uploadList");
      if (!el) return;

      if (!user) {

        return;
      }

      if (!list.length) {
        el.innerHTML = `<div class="empty">No tienes SKUs tomados o rechazados para volver a subir.</div>`;

      el.innerHTML = list.map(record => renderSkuItem(record, selectedUploadId, "selectUpload")).join("");

    async function renderUploadDetail() {
      const el = document.getElementById("uploadDetail");
      if (!el) return;

      const record = getRecord(selectedUploadId);
      const available = getUploadCandidateRecords().length;
      const selectedTitle = record ? `Subida para ${escapeHtml(record.sku)}` : "Subida inteligente por nombre de archivo";
      const selectedText = record
        ? `Puedes subir una o varias imágenes de este SKU. El nombre debe venir como SKU_VISTA para poder asociarlo correctamente.`
        : `Arrastra varias imágenes y el sistema buscará nombres exactos con formato SKU_VISTA para enviarlas a revisión.`;
      const preview = record ? await getPreviewHtml(record) : `<span>Selecciona un SKU de la lista para ver su última subida, o carga imágenes masivas directamente aquí.</span>`;

      el.innerHTML = `
        <div class="detail-header">

        >
          <strong>Arrastra una o varias imágenes aquí</strong>

        </label>

        <div class="upload-helper">
          <strong>Cómo debe venir el nombre:</strong> el archivo debe venir solo como <strong>SKU_VISTA</strong>, por ejemplo
          <strong>123456789_1.jpg</strong>, <strong>123456789_01.jpg</strong> o <strong>123456789_001.jpg</strong>.
          No debe incluir palabras adicionales antes ni después del SKU. Si un SKU fue rechazado, se mantiene asignado al mismo editor y al volver a subirlo pasa nuevamente a revisión.
