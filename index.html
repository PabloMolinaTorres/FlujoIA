    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
    }

    async function handleDropUpload(event, id) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
      if (!requireTabAccess("upload")) return;
      await handleGeneratedUpload(id, event.dataTransfer.files);
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function fileNameWithoutExtension(fileName) {
      return String(fileName || "").replace(/\.[^/.]+$/, "");
    }

    function fileNameMatchesSku(fileName, sku) {
      const base = normalizeText(fileNameWithoutExtension(fileName));
      const normalizedSku = normalizeText(sku);
      if (!base || !normalizedSku) return false;

      const escapedSku = escapeRegExp(normalizedSku);
      const pattern = new RegExp(`^${escapedSku}_[0-9]{1,3}$`);
      return pattern.test(base);
    }

    function findRecordForUploadedFile(file, candidates) {
      const sorted = [...candidates].sort((a, b) => String(b.sku || "").length - String(a.sku || "").length);
      return sorted.find(record => fileNameMatchesSku(file.name, record.sku));
    }

    async function handleGeneratedUpload(id, files) {
      if (!requireTabAccess("upload")) return;
      if (!files || !files.length) return;

      try {
        const imageFiles = [...files].filter(file => file.type.startsWith("image/"));

        if (!imageFiles.length) {
          alert("Debes subir archivos de imagen.");
          return;
        }

        const candidates = getUploadCandidateRecords();
        const selectedRecord = id ? getRecord(id) : null;
        const groups = new Map();
        const unmatched = [];

        imageFiles.forEach(file => {
          let target = findRecordForUploadedFile(file, candidates);

          if (!target && selectedRecord && imageFiles.length === 1) {
            target = selectedRecord;
          }

          if (!target) {
            unmatched.push(file.name);
            return;
          }

          if (!groups.has(target.id)) groups.set(target.id, { record: target, files: [] });
          groups.get(target.id).files.push(file);
        });

        if (!groups.size) {
          alert(
            "No se pudo asociar ninguna imagen a un SKU tomado o rechazado.\n\n" +
            "Revisa que el nombre del archivo venga como SKU_VISTA exacto, por ejemplo 123456789_1.jpg.\n\n" +
            unmatched.slice(0, 12).join("\n")
          );
          return;
        }

        let uploadedCount = 0;
        const changedRecords = [];

        for (const group of groups.values()) {
          const record = group.record;
          if (!Array.isArray(record.generatedImages)) record.generatedImages = [];

          for (let i = 0; i < group.files.length; i++) {
            const file = group.files[i];
            const imageId = `${record.id}_${Date.now()}_${i}_${Math.random().toString(16).slice(2)}`;
            const cleanName = safeFileName(file.name);
            const path = `${STORAGE_ROOT}/${record.id}/${imageId}_${cleanName}`;
            const ref = storageRef(storage, path);

            await uploadBytes(ref, file, { contentType: file.type });

            const uploadedAt = new Date().toISOString();
            const uploadedBy = currentUser();

            record.generatedImages.push({
              id: imageId,
              name: file.name,
              path,
              size: file.size,
              type: file.type,
              matchedSku: record.sku,
              uploadedAt,
              uploadedBy
            });

            if (!Array.isArray(record.uploadEvents)) record.uploadEvents = [];
            record.uploadEvents.push({
              id: imageId,
              name: file.name,
              sku: record.sku,
              editor: record.editor || uploadedBy,
              uploadedBy,
              uploadedAt,
              size: file.size
            });

            uploadedCount++;
          }

          record.generatedImageName = getRecordImages(record).map(img => img.name).join(", ");
          record.estado = STATUS.REVISION;
          record.editor = record.editor || currentUser();
          record.motivoRechazo = "";
          record.uploadedAt = new Date().toISOString();
          record.updatedAt = new Date().toISOString();
          changedRecords.push(record);
        }

        for (const record of changedRecords) {
          await saveRecord(record);
        }

        selectedUploadId = "";
        await refresh();

        let message = `${uploadedCount} imagen(es) subidas a revisión en ${changedRecords.length} SKU(s).`;
        if (unmatched.length) {
          message += `\n\nNo asociadas:\n${unmatched.slice(0, 12).join("\n")}`;
          alert(message);
        } else {
          toast(message);
        }
      } catch (error) {
        console.error(error);
        alert("No se pudo subir la imagen a Firebase Storage. Revisa reglas/permisos de Storage.");
      }
    }

    function encodeForInline(value) {
      return encodeURIComponent(String(value || ""));
    }

    function addFalabellaImageSize(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";

      const noSize = raw.replace("/w=1500,h=1500,fit=pad", "");

      if (!noSize.includes("media.falabella.com")) {
        return noSize;
      }

      // Falabella media funciona como:
      // https://media.falabella.com/falabellaCL/SKU_1/w=1500,h=1500,fit=pad
      // No debe quedar /public al final, porque genera 404 en varias vistas.
      const noPublic = noSize.replace(/\/public\/?$/, "");

      if (noPublic.endsWith("/w=1500,h=1500,fit=pad")) {
        return noPublic;
      }

      return `${noPublic}/w=1500,h=1500,fit=pad`;
    }

    function isFalabellaMediaUrl(value) {
      const url = String(value || "");
      return url.includes("media.falabella.com") ||
        url.includes("imagedelivery.net") ||
        url.includes("/falabellaCL/");
    }

    function extractMediaItems(value, found = []) {
      if (!value) return found;

      if (typeof value === "string") {
        if (isFalabellaMediaUrl(value)) {
          found.push({ url: value, position: null });
        }
        return found;
      }

      if (Array.isArray(value)) {
        value.forEach(item => extractMediaItems(item, found));
        return found;
      }

      if (typeof value === "object") {
        const url = value.media_url || value.mediaUrl || value.url || value.src;
        const positionRaw = value.position ?? value.pos ?? value.order ?? value.sequence ?? null;

        if (url && isFalabellaMediaUrl(url)) {
          const position = positionRaw === null || positionRaw === "" ? null : Number(positionRaw);
          found.push({
            url,
            position: Number.isFinite(position) ? position : null
          });
        }

        Object.values(value).forEach(item => extractMediaItems(item, found));
      }

      return found;
    }

    function uniqueMediaItems(items) {
      const seen = new Set();
      const output = [];

      items.forEach(item => {
        const cleanUrl = String(item.url || "").trim().replace("/w=1500,h=1500,fit=pad", "");
        if (!cleanUrl || seen.has(cleanUrl)) return;
        seen.add(cleanUrl);
        output.push({ ...item, url: cleanUrl });
      });

      return output;
    }

    function sortMediaItems(items) {
      return [...items].sort((a, b) => {
        const pa = Number.isFinite(Number(a.position)) ? Number(a.position) : 9999;
        const pb = Number.isFinite(Number(b.position)) ? Number(b.position) : 9999;
        if (pa !== pb) return pa - pb;
        return String(a.url).localeCompare(String(b.url));
      });
    }

    async function getMediaItemsBySku(sku) {
      const response = await fetch(endpointBySku(sku), { cache: "no-store" });
      if (!response.ok) throw new Error(`Error JSON ${response.status}`);

      const json = await response.json();
      return sortMediaItems(uniqueMediaItems(extractMediaItems(json)));
    }

    async function getPos1Url(record) {
      if (!record || !record.sku) return "";
      if (Object.prototype.hasOwnProperty.call(pos1Cache, record.sku)) return pos1Cache[record.sku];

      // Para la revisión no consultamos el JSON, porque el endpoint puede bloquear CORS.
      // POS1 se arma directo con la lógica Falabella: SKU_1.
      const url = buildFalabellaViewUrl(record.sku, "1");
      pos1Cache[record.sku] = url;
      return url;
    }

    async function getReviewComparisonHtml(record) {
      const images = getRecordImages(record);
      const pos1Url = await getPos1Url(record);

      if (!images.length) {
        return `<div class="compare-empty">Sin imagen subida</div>`;
      }

      const pairs = [];

      for (const image of images) {
        let workedUrl = "";

        try {
          workedUrl = image.path ? await getDownloadURL(storageRef(storage, image.path)) : "";
        } catch (error) {
          console.warn("No se pudo cargar imagen trabajada:", image.path, error);
        }

        const posHtml = pos1Url ? `
          <div class="compare-image-frame">
            <img src="${escapeHtml(pos1Url)}" alt="POS1 actual" onclick="openImageModal('${encodeForInline(pos1Url)}', '${encodeForInline(record.sku + " · POS1 actual")}')">
          </div>
        ` : `<div class="compare-empty">No se pudo armar POS1 actual</div>`;

        const workedHtml = workedUrl ? `
          <div class="compare-image-frame">
            <img src="${escapeHtml(workedUrl)}" alt="${escapeHtml(image.name || "Imagen trabajada")}" onclick="openImageModal('${encodeForInline(workedUrl)}', '${encodeForInline(image.name || record.sku + " · imagen trabajada")}')">
          </div>
        ` : `<div class="compare-empty">Imagen trabajada no disponible</div>`;

        pairs.push(`
          <div class="compare-pair">
            <div class="compare-box">
              <div class="compare-title">Actual POS1 <span>SKU_1</span></div>
              ${posHtml}
            </div>
            <div class="compare-box">
              <div class="compare-title">Imagen trabajada <span>${escapeHtml(image.name || "Sin nombre")}</span></div>
              ${workedHtml}
            </div>
          </div>
        `);
      }

      return pairs.join("");
    }

    async function renderReviewList() {
      const el = document.getElementById("reviewList");
      if (!el) return;

      const list = sortByPriority(records).filter(record => record.estado === STATUS.REVISION);

      if (!list.length) {
        el.innerHTML = `<div class="empty">No hay SKUs pendientes de revisión.</div>`;
        return;
      }

      const htmlParts = [];

      for (const record of list) {
        const comparison = await getReviewComparisonHtml(record);

        htmlParts.push(`
          <article class="review-card">
            <div class="review-side">
              <div class="review-top">
                <input type="checkbox" class="review-check" value="${escapeHtml(record.id)}">
                <strong>${escapeHtml(record.sku)}</strong>
              </div>

              <div>${priorityPill(record.prioridad)} ${statusPill(record.estado)}</div>

              <div class="review-meta">
                Marca: ${escapeHtml(record.marca || "Sin marca")}<br>
                Editor: ${escapeHtml(record.editor || "Sin editor")}<br>
                Veces rechazadas: ${escapeHtml(getRejectionCount(record))}<br>
                Subido: ${formatDate(record.uploadedAt) || "-"}
              </div>

              <div class="reject-box">
                <label>Motivo de rechazo</label>
                <textarea id="rejectReason_${escapeHtml(record.id)}" placeholder="Escribe aquí el motivo si esta imagen se rechaza."></textarea>
              </div>

              <div class="actions">
                <button class="btn btn-primary btn-small" onclick="approveOne('${record.id}')">Aprobar y descargar</button>
                <button class="btn btn-red btn-small" onclick="rejectOne('${record.id}')">Rechazar</button>
              </div>
            </div>

            <div class="review-visual-area">${comparison}</div>
          </article>
        `);
      }

      el.innerHTML = htmlParts.join("");
    }

    function getRejectionCount(record) {
      return Math.max(Number(record?.rejectionCount ?? (Number(record?.version || 1) - 1) ?? 0), 0);
    }

    function assignmentOptions(selectedEditor = "") {
      const assignable = Object.keys(USER_ROLES).filter(user =>
        USER_ROLES[user] === ROLES.RETOCADOR || USER_ROLES[user] === ROLES.ADMIN
      );

      if (selectedEditor && !assignable.includes(selectedEditor)) {
        assignable.push(selectedEditor);
      }

      const unique = [...new Set(assignable)].sort((a, b) => a.localeCompare(b, "es"));

      return `
        <option value="">Sin asignar</option>
        ${unique.map(user => {
          const label = ROLE_LABELS[USER_ROLES[user]] ? `${user} · ${ROLE_LABELS[USER_ROLES[user]]}` : user;
          return `<option value="${escapeHtml(user)}" ${user === selectedEditor ? "selected" : ""}>${escapeHtml(label)}</option>`;
        }).join("")}
      `;
    }

    async function adminSetEditor(id, editor) {
      if (!requireAdmin()) return;

      const record = getRecord(id);
      if (!record) return;

      const previousEditor = record.editor || "";
      const newEditor = String(editor || "").trim();

      if (newEditor && USER_ROLES[newEditor] !== ROLES.RETOCADOR && USER_ROLES[newEditor] !== ROLES.ADMIN) {
        alert("Solo puedes asignar SKUs a usuarios con rol Retocador o Admin.");
        refresh();
        return;
      }

      record.editor = newEditor;
      record.updatedAt = new Date().toISOString();

      if (newEditor) {
        if (record.estado === STATUS.PENDIENTE) {
          record.estado = STATUS.TRABAJO;
          record.takenAt = new Date().toISOString();
        }

        if (record.estado === STATUS.TRABAJO && !record.takenAt) {
          record.takenAt = new Date().toISOString();
        }

        // Si el SKU está rechazado, se mantiene como rechazado para que el editor vea el motivo.
        if (previousEditor !== newEditor) {
          toast(`SKU ${record.sku} asignado a ${newEditor}.`);
        }
      } else {
        record.takenAt = "";

        if (record.estado === STATUS.TRABAJO || record.estado === STATUS.RECHAZADO) {
          record.estado = STATUS.PENDIENTE;
        }

        toast(`SKU ${record.sku} quedó sin asignación.`);
      }

      await saveRecord(record);
      await refresh();
    }

    function startOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function startOfMonth(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(1);
      return d;
    }

    function createReviewEvents(record, result) {
      const images = getRecordImages(record);
      const reviewedAt = new Date().toISOString();
      const editor = record.editor || "Sin editor";
      const revisor = currentUser() || "Sin revisor";

      if (!Array.isArray(record.reviewEvents)) record.reviewEvents = [];

      images.forEach((image, index) => {
        record.reviewEvents.push({
          id: `${record.id}_${result}_${Date.now()}_${index}_${Math.random().toString(16).slice(2)}`,
          sku: record.sku,
          name: image.name || "",
          editor,
          revisor,
          result,
          reviewedAt,
          uploadedAt: image.uploadedAt || record.uploadedAt || "",
          size: image.size || 0
        });
      });
    }

    function getReviewEvents(record) {
      if (Array.isArray(record.reviewEvents) && record.reviewEvents.length) return record.reviewEvents;

      const status = record.estado;
      if (![STATUS.DESCARGADO, STATUS.RECHAZADO].includes(status)) return [];

      const result = status === STATUS.DESCARGADO ? "approved" : "rejected";
      const baseDate = record.reviewedAt || record.downloadedAt || record.updatedAt || record.uploadedAt || record.createdAt;
      const count = Math.max(1, (record.lastImageNames || "").split(",").map(x => x.trim()).filter(Boolean).length);

      return Array.from({ length: count }, (_, index) => ({
        id: `${record.id}_${result}_legacy_${index}`,
        sku: record.sku,
        name: (record.lastImageNames || "").split(",")[index]?.trim() || "",
        editor: record.editor || "Sin editor",
        revisor: record.revisor || "Sin revisor",
        result,
        reviewedAt: baseDate
      }));
    }

    function getUploadEvents(record) {
      if (Array.isArray(record.uploadEvents) && record.uploadEvents.length) return record.uploadEvents;

      return getRecordImages(record).map(image => ({
        id: image.id || uid(),
        name: image.name || "",
        sku: record.sku,
        editor: record.editor || image.uploadedBy || "Sin editor",
        uploadedBy: image.uploadedBy || record.editor || "Sin editor",
        uploadedAt: image.uploadedAt || record.uploadedAt || record.updatedAt || record.createdAt,
        size: image.size || 0
      }));
    }

    function endOfWeekFromStart(weekStart) {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + 6);
      d.setHours(23, 59, 59, 999);
      return d;
    }

    function calculateMetrics() {
      const now = new Date();
      const weekStart = startOfWeek(now);
      const weekEnd = endOfWeekFromStart(weekStart);
      const monthStart = startOfMonth(now);
      const users = [...new Set(Object.keys(USER_ROLES).filter(user =>
        USER_ROLES[user] === ROLES.RETOCADOR || USER_ROLES[user] === ROLES.ADMIN
      ))].sort((a, b) => a.localeCompare(b, "es"));
      const byUser = {};
      const events = [];

      users.forEach(user => {
        byUser[user] = {
          weekApproved: 0,
          weekRejected: 0,
          monthApproved: 0,
          monthRejected: 0,
          totalApproved: 0,
          totalRejected: 0
        };
      });

      records.forEach(record => {
        getReviewEvents(record).forEach(event => {
          const user = event.editor || record.editor || "Sin editor";
          if (!byUser[user]) {
            byUser[user] = {
              weekApproved: 0,
              weekRejected: 0,
              monthApproved: 0,
              monthRejected: 0,
              totalApproved: 0,
              totalRejected: 0
            };
          }

          const eventDate = new Date(event.reviewedAt || event.date || record.reviewedAt || record.updatedAt || Date.now());
          if (Number.isNaN(eventDate.getTime())) return;

          const isApproved = event.result === "approved";
          const totalKey = isApproved ? "totalApproved" : "totalRejected";
          const weekKey = isApproved ? "weekApproved" : "weekRejected";
          const monthKey = isApproved ? "monthApproved" : "monthRejected";

          byUser[user][totalKey] += 1;
          if (eventDate >= weekStart && eventDate <= weekEnd) byUser[user][weekKey] += 1;
          if (eventDate >= monthStart) byUser[user][monthKey] += 1;

          events.push({
            fecha: eventDate.toISOString(),
            semanaInicio: weekStart.toISOString(),
            sku: event.sku || record.sku,
            archivo: event.name || "",
            retocador: user,
            revisor: event.revisor || record.revisor || "",
            resultado: isApproved ? "Aprobado" : "Rechazado"
          });
        });
      });

      return { byUser, events, weekStart, weekEnd, monthStart };
    }

    function metricRows() {
      const { byUser, events, weekStart, weekEnd, monthStart } = calculateMetrics();
      const rows = Object.keys(byUser).map(user => {
        const data = byUser[user];
        const weekTotal = data.weekApproved + data.weekRejected;
        const monthTotal = data.monthApproved + data.monthRejected;
        const total = data.totalApproved + data.totalRejected;

        return {
          user,
          weekApproved: data.weekApproved,
          weekRejected: data.weekRejected,
          weekTotal,
          monthApproved: data.monthApproved,
          monthRejected: data.monthRejected,
          monthTotal,
          totalApproved: data.totalApproved,
          totalRejected: data.totalRejected,
          total
        };
      }).sort((a, b) => b.weekTotal - a.weekTotal || b.monthTotal - a.monthTotal || a.user.localeCompare(b.user, "es"));

      return { rows, events, weekStart, weekEnd, monthStart };
    }

    function renderStackedBarChart(rows, period) {
      const approvedKey = period === "week" ? "weekApproved" : "monthApproved";
      const rejectedKey = period === "week" ? "weekRejected" : "monthRejected";
      const totalKey = period === "week" ? "weekTotal" : "monthTotal";
      const max = Math.max(...rows.map(row => row[totalKey]), 1);

      return `
        <div class="metric-legend">
          <span><i class="legend-dot legend-approved"></i>Aprobadas</span>
          <span><i class="legend-dot legend-rejected"></i>Rechazadas</span>
        </div>
        <div class="bar-list">
          ${rows.map(row => {
            const total = row[totalKey];
            const approvedWidth = total ? (row[approvedKey] / total) * 100 : 0;
            const rejectedWidth = total ? (row[rejectedKey] / total) * 100 : 0;
            const trackWidth = Math.round((total / max) * 100);

            return `
              <div class="bar-row">
                <div>${escapeHtml(row.user)}</div>
                <div class="bar-track">
                  <div class="bar-stack" style="width:${trackWidth}%">
                    <div class="bar-fill-approved" style="width:${approvedWidth}%"></div>
                    <div class="bar-fill-rejected" style="width:${rejectedWidth}%"></div>
                  </div>
                </div>
                <div class="bar-counts">${row[approvedKey]} / ${row[rejectedKey]} · ${total}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

          <div class="metric-card"><small>Rechazadas esta semana</small><strong>${totalWeekRejected}</strong></div>
          <div class="metric-card"><small>Total esta semana</small><strong>${totalWeekApproved + totalWeekRejected}</strong></div>

        <div class="master-table-wrap">

    function downloadMetricsExcel() {
      if (!requireAdmin()) return;

      const { rows, events, weekStart, weekEnd, monthStart } = metricRows();
      const summaryRows = rows.map(row => ({
        Retocador: row.user,
        "Aprobadas semana": row.weekApproved,
        "Rechazadas semana": row.weekRejected,
        "Total semana": row.weekTotal,
        "Aprobadas mes": row.monthApproved,
        "Rechazadas mes": row.monthRejected,
        "Total mes": row.monthTotal,
        "Aprobadas histórico": row.totalApproved,
        "Rechazadas histórico": row.totalRejected,
        "Total histórico": row.total
      }));

      const detailRows = events
        .sort((a, b) => new Date(b.fecha) - new Date(a.fecha))
        .map(event => ({
          Fecha: formatDate(event.fecha),
          SKU: event.sku,
          Archivo: event.archivo,
          Retocador: event.retocador,
          Revisor: event.revisor,
          Resultado: event.resultado
        }));

      const infoRows = [
        { Campo: "Semana", Valor: `${formatDate(weekStart.toISOString()).split(" ")[0]} a ${formatDate(weekEnd.toISOString()).split(" ")[0]}` },
        { Campo: "Mes desde", Valor: formatDate(monthStart.toISOString()).split(" ")[0] },
        { Campo: "Generado", Valor: formatDate(new Date().toISOString()) }
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(infoRows), "Periodo");
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(summaryRows), "Resumen");
      XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(detailRows), "Detalle");
      XLSX.writeFile(workbook, `metricas_flujo_ia_${dateStamp()}.xlsx`);
    }

    function getReviewReason(id) {
      const el = document.getElementById(`rejectReason_${id}`);
      return el ? el.value.trim() : "";
    }

    async function rejectOne(id) {
      if (!requireTabAccess("review")) return;
      const reason = getReviewReason(id);

      if (!reason) {
        alert("Escribe el motivo del rechazo en la tarjeta antes de rechazar.");

      }

    function getSelectedReviewIds() {

    }

    function toggleSelectAllReviews() {
      const checks = [...document.querySelectorAll(".review-check")];
      if (!checks.length) return;

      const shouldCheck = checks.some(input => !input.checked);
      checks.forEach(input => {
        input.checked = shouldCheck;
      });

    async function approveSelected() {
      if (!requireTabAccess("review")) return;
      const ids = getSelectedReviewIds();

      if (!ids.length) {
        alert("Selecciona al menos un SKU.");
        return;
      }

      await approveAndDownload(ids);
    }

    async function rejectSelected() {
      if (!requireTabAccess("review")) return;

      const ids = getSelectedReviewIds();
      const bulkReason = document.getElementById("bulkReason").value.trim();

      if (!ids.length) {
        alert("Selecciona al menos un SKU.");
        return;
      }

      const reasonById = {};
      const missing = [];

      ids.forEach(id => {
        const reason = bulkReason || getReviewReason(id);
        if (!reason) missing.push(id);
        reasonById[id] = reason;
      });

      if (missing.length) {
        alert("Falta escribir motivo de rechazo en una o más tarjetas seleccionadas, o usa el motivo múltiple de arriba.");
        return;
      }

      await rejectRecordsWithReasons(reasonById);
      document.getElementById("bulkReason").value = "";
    }

    async function approveAndDownload(ids) {
      const selectedRecords = ids.map(getRecord).filter(Boolean);
      const validRecords = selectedRecords.filter(record => getRecordImages(record).length);

      if (!validRecords.length) {
        alert("No hay imágenes para descargar.");
        return;
      }

      try {
        toast("Preparando descarga...");

        const zip = new JSZip();
        let totalFiles = 0;

        for (const record of validRecords) {
          const folder = zip.folder(safeFileName(record.sku));
          const images = getRecordImages(record);

          for (const image of images) {
            if (!image.path) continue;

            const blob = await downloadStorageBlob(image.path);
            folder.file(image.name || `${record.sku}_${totalFiles + 1}.jpg`, blob);
            totalFiles++;
          }
        }

        if (!totalFiles) {
          alert("No se pudo descargar ninguna imagen.");
          return;
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        saveAs(zipBlob, `aprobadas_flujo_ia_${dateStamp()}.zip`);

        for (const record of validRecords) {
          const imageNames = getRecordImages(record).map(img => img.name).join(", ");
          createReviewEvents(record, "approved");
          await deleteImagesFromStorage(record);

          record.estado = STATUS.DESCARGADO;
          record.revisor = currentUser();
          record.motivoRechazo = "";
          record.lastImageNames = imageNames;
          record.generatedImages = [];
          record.generatedImageId = "";
          record.generatedImageName = "";
          record.reviewedAt = new Date().toISOString();
          record.downloadedAt = new Date().toISOString();
          record.updatedAt = new Date().toISOString();

          await saveRecord(record);
        }

        await refresh();
        toast(`${totalFiles} imagen(es) descargadas y borradas del storage.`);
      } catch (error) {
        console.error(error);
        alert("No se pudo aprobar/descargar. Revisa permisos de Storage o conexión.");
      }
    }

    async function rejectRecordsWithReasons(reasonById) {
      try {
        const ids = Object.keys(reasonById || {});

        for (const id of ids) {
          const record = getRecord(id);
          if (!record) continue;

          const imageNames = getRecordImages(record).map(img => img.name).join(", ");
          createReviewEvents(record, "rejected");
          await deleteImagesFromStorage(record);

          record.estado = STATUS.RECHAZADO;
          record.revisor = currentUser();
          record.motivoRechazo = reasonById[id];
          record.version = Number(record.version || 1) + 1;
          record.rejectionCount = getRejectionCount(record) + 1;
          record.lastImageNames = imageNames;
          record.generatedImages = [];
          record.generatedImageId = "";
          record.generatedImageName = "";
          record.reviewedAt = new Date().toISOString();
          record.updatedAt = new Date().toISOString();

          await saveRecord(record);
        }

        await refresh();
        toast(`${ids.length} SKU(s) rechazados. Se mantienen asignados al editor original.`);
      } catch (error) {
        console.error(error);
        alert("No se pudo rechazar o borrar imágenes. Revisa permisos de Storage.");
      }
    }

    async function deleteImagesFromStorage(record) {
      const images = getRecordImages(record);

      for (const image of images) {
        if (!image.path) continue;

        try {
          await deleteObject(storageRef(storage, image.path));
        } catch (error) {
          console.warn("No se pudo borrar imagen:", image.path, error);
        }
      }
    }

    function extractMediaUrls(value, found = []) {
      if (!value) return found;

      if (typeof value === "string") {
        if (
          value.includes("media.falabella.com") ||
          value.includes("imagedelivery.net") ||
          value.includes("/falabellaCL/")
        ) {
          found.push(value);
        }

        return found;
      }

      if (Array.isArray(value)) {
        value.forEach(item => extractMediaUrls(item, found));
        return found;
      }

      if (typeof value === "object") {
        Object.values(value).forEach(item => extractMediaUrls(item, found));
      }

      return found;
    }

    function uniqueUrls(urls) {
      return [...new Set(
        urls
          .map(url => String(url || "").trim())
          .filter(Boolean)
          .map(url => url.replace("/w=1500,h=1500,fit=pad", ""))
      )];
    }

    function imageFileName(url, index, sku) {
      try {
        const noQuery = String(url || "").split("?")[0];
        const cleanUrl = noQuery
          .replace(/\/public\/?$/, "")
          .replace(/\/w=1500,h=1500,fit=pad\/?$/, "");

        const lastPart = cleanUrl.split("/").filter(Boolean).pop();

        if (lastPart && !lastPart.includes("w=1500")) return `${safeFileName(lastPart)}.jpg`;
      } catch {}

      return `${safeFileName(sku)}_${String(index + 1).padStart(2, "0")}.jpg`;
    }

    async function downloadSkuImages(id) {
      if (!requireTabAccess("work")) return;

      const record = getRecord(id);
      if (!record) return;

      try {
        toast("Buscando imágenes...");

        let mediaItems = [];
        try {
          mediaItems = await getMediaItemsBySku(record.sku);
        } catch (error) {
          console.warn("No se pudo leer JSON. Se usará búsqueda directa por vistas SKU_1 a SKU_12:", error);
          mediaItems = buildDirectMediaItems(record.sku, 12);
        }

        const urls = mediaItems
          .map(item => item.direct ? item.url : addFalabellaImageSize(item.url))
          .filter(Boolean);

        if (!urls.length) {
          alert("No se encontraron imágenes para este SKU.");
          return;
        }

        const zip = new JSZip();
        const folder = zip.folder(safeFileName(record.sku));
        let downloaded = 0;

        for (let i = 0; i < urls.length; i++) {
          try {
            const imgResponse = await fetch(urls[i], { cache: "no-store" });
            if (!imgResponse.ok) continue;

            const blob = await imgResponse.blob();
            const fileName = imageFileName(urls[i], i, record.sku);
            folder.file(fileName, blob);
            downloaded++;
          } catch (error) {
            console.warn("No se pudo descargar imagen:", urls[i], error);
          }
        }

        if (!downloaded) {
          alert("No se pudo descargar ninguna imagen. Puede ser bloqueo del CDN, CORS o que las vistas directas no existan.");
          return;
        }

        const blob = await zip.generateAsync({ type: "blob" });
        saveAs(blob, `${safeFileName(record.sku)}.zip`);

        toast(`Descarga lista: ${downloaded} imagen(es).`);
      } catch (error) {
        console.error(error);
        alert("No se pudo descargar las imágenes. Revisa que el SKU exista o que el CDN permita la descarga.");
      }
    }

    function getRecordImages(record) {
      if (Array.isArray(record.generatedImages) && record.generatedImages.length) return record.generatedImages;
      return [];
    }

    async function downloadStorageBlob(path) {
      const ref = storageRef(storage, path);

      try {
        return await getBlob(ref);
      } catch (error) {
        console.warn("getBlob falló, se intentará con getDownloadURL:", path, error);
        const url = await getDownloadURL(ref);
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`No se pudo descargar archivo de Storage: ${response.status}`);
        }

        return await response.blob();
      }
    }

    async function getPreviewHtml(record) {
      const images = getRecordImages(record);

      if (!images.length) {
        return `<span>Sin imagen subida</span>`;
      }

      try {
        const items = [];

        for (const image of images) {
          if (!image.path) continue;

          try {
            const url = await getDownloadURL(storageRef(storage, image.path));

            items.push(`
              <div class="preview-item">
                <img src="${escapeHtml(url)}" alt="${escapeHtml(image.name || "Imagen generada")}">
                <div class="preview-name">${escapeHtml(image.name || "")}</div>
              </div>
            `);
          } catch (error) {
            console.warn("No se pudo cargar preview desde Storage:", image.path, error);

            items.push(`
              <div class="preview-item">
                <div class="empty" style="padding:20px;">Imagen no disponible</div>
                <div class="preview-name">${escapeHtml(image.name || "")}</div>
              </div>
            `);
          }
        }

        return `<div class="preview-grid">${items.join("")}</div>`;
      } catch {
        return `<span>No se pudo cargar la imagen</span>`;
      }
    }


    function openImageModal(encodedUrl, encodedTitle) {
      const modal = document.getElementById("imageModal");
      const img = document.getElementById("imageModalImg");
      const title = document.getElementById("imageModalTitle");
      if (!modal || !img || !title) return;

      img.src = decodeURIComponent(encodedUrl || "");
      title.textContent = decodeURIComponent(encodedTitle || "Vista ampliada");
      modal.classList.remove("hidden");
    }

    function closeImageModal(event) {
      if (event) event.stopPropagation();
      const modal = document.getElementById("imageModal");
      const img = document.getElementById("imageModalImg");
      if (!modal || !img) return;

      modal.classList.add("hidden");
      img.src = "";
    }
